<div data-pagefind-ignore="all" class="container home-posts">
    <div class="row">
        <!-- USE SIDEBAR -->
        <!-- Post Container -->
   	    <div class="
            col-lg-8 col-lg-offset-1
            col-md-8 col-md-offset-1
            col-sm-12
            col-xs-12
            post-container
        ">
            <section class="home-intro">
              <div class="home-intro__inner">
                <h2 class="home-intro__title">{{ .Site.Title }}</h2>
                <p class="home-intro__sub"><span id="home-typewriter"></span><span class="home-tw-cursor" aria-hidden="true"></span></p>
              </div>
              <!-- 滚动指引:加速道式 /\ ×3,暗示"往上滚/加速"。JS 按 scroll 淡出 -->
              <div class="hero-scroll-hint" aria-hidden="true">
                <span class="hero-scroll-hint__mark"></span>
                <span class="hero-scroll-hint__mark"></span>
                <span class="hero-scroll-hint__mark"></span>
              </div>
            </section>
            <script>
            document.addEventListener('DOMContentLoaded', function(){
              var el = document.getElementById('home-typewriter');
              if(!el) return;
              var text = {{ .Site.Params.slogan | jsonify | safeJS }};
              // ?replay=1 时强制重播(与 hero 缩放同步测试),否则同 session 内只播一次
              var twReplay = new URLSearchParams(location.search).get('replay');
              if (!twReplay && sessionStorage.getItem('homeTwPlayed') === 'true') {
                el.textContent = text;
                return;
              }
              var i = 0; el.textContent = '';
              setTimeout(function type(){
                if(i < text.length){ el.textContent += text.charAt(i); i++; setTimeout(type, 90); }
                else { sessionStorage.setItem('homeTwPlayed', 'true'); }
              }, 600);
            });
            </script>
            <script>
            // hero 缩放(Apple 风):首次进首页全屏 sticky → scroll 缩成卡片;再次进直接小卡片不重播
            // 终态 = Archive/About 页的静态 .home-intro 卡片(实测:height156/radius16/no-shadow/title36/sub17)
            // ⚠️ 必须包 DOMContentLoaded:本 <script> 在 DOM 里排在 .js-post-stream 之前(posts.html 先渲染
            //    hero 再渲染 post_list),立即执行时 querySelector('.js-post-stream') 返回 null → 文章流
            //    补偿 transform 永不写入 = hero 与文章脱节的根因。等 DOM 解析完再取 stream。
            document.addEventListener('DOMContentLoaded', function(){
              // hero 缩放依赖双列内部滚动(@media≥992px .post-container 自己 overflow-y:auto)。
              // 窄屏(<992px)是整页 body 滚动,scroll 监听绑 post-container 不触发 + 几何全错 → 跳过,
              // 用静态卡(.home-intro 基础样式 / @media≤991 的 132px)。

              var heroEl = document.querySelector('.home-intro');
              var pcEl = document.querySelector('.home-posts > .row > .post-container');
              if(!heroEl || !pcEl) return;

              // 清理 hero 的所有 inline style(宽→窄切换时,让 CSS 媒体查询接管静态卡)
              function clearHeroInline(){
                heroEl.classList.remove('is-hero');
                heroEl.style.cssText = '';
                var t = heroEl.querySelector('.home-intro__title');
                var s = heroEl.querySelector('.home-intro__sub');
                var h = heroEl.querySelector('.hero-scroll-hint');
                if(t){ t.style.cssText=''; }
                if(s){ s.style.cssText=''; }
                if(h){ h.style.cssText=''; }
                var st = pcEl.querySelector('.js-post-stream');
                var lm = pcEl.querySelector('.post-load-more-wrap');
                if(st){ st.style.transform=''; }
                if(lm){ lm.style.transform=''; }
              }

              var mq = window.matchMedia('(min-width: 992px)');
              var scrollHandler = null;

              function initDesktop(){
                clearHeroInline();   // 先清残留(可能从窄屏切来)
                var stream = pcEl.querySelector('.js-post-stream');
                var loadMoreWrap = pcEl.querySelector('.post-load-more-wrap');
                if(!stream) return;
                var dark = document.documentElement.getAttribute('data-theme')==='dark';
                var replay = new URLSearchParams(location.search).get('replay');
                var played = !replay && sessionStorage.getItem('homeHeroPlayed') === 'true';
                heroEl.classList.add('is-hero');
                var title = heroEl.querySelector('.home-intro__title');
                var sub = heroEl.querySelector('.home-intro__sub');
                var hint = heroEl.querySelector('.hero-scroll-hint');

                var cardH = 156, cardRadius = 16, cardTitleFS = 36, cardSubFS = 17;
                var fullTitleFS = 60, fullSubFS = 24, cardPadL = 40, cardPadT = 44;
                var fullH = pcEl.clientHeight;
                var fullScreenH = Math.round(fullH * 0.92);
                var RANGE = fullScreenH - cardH;
                var STREAM_GAP = 28;

                function lerp(a,b,t){return a+(b-a)*t;}
                function smooth(t){return t*t*(3-2*t);}
                var done = played;

                function update(){
                  var scroll = pcEl.scrollTop;
                  var p = Math.min(Math.max(scroll/RANGE,0),1);
                  var e = smooth(p);
                  var h = lerp(fullScreenH, cardH, e);
                  heroEl.style.height = h.toFixed(0) + 'px';
                  heroEl.style.marginBottom = (fullScreenH - h).toFixed(0) + 'px';
                  heroEl.style.borderRadius = lerp(cardRadius + 12, cardRadius, e).toFixed(1) + 'px';
                  var shA = dark ? lerp(0,0.18,e)*(1-Math.abs(2*p-1)) : lerp(0,0.05,e)*(1-Math.abs(2*p-1));
                  heroEl.style.boxShadow = shA>0.005 ? '0 '+lerp(0,2,e).toFixed(0)+'px '+lerp(0,8,e).toFixed(0)+'px rgba(13,40,55,'+shA.toFixed(2)+')' : 'none';
                  if(title){
                    title.style.transform = 'scale(' + lerp(fullTitleFS/cardTitleFS, 1, e).toFixed(4) + ')';
                    title.style.marginBottom = lerp(28, 8, e).toFixed(0) + 'px';
                  }
                  if(sub){ sub.style.transform = 'scale(' + lerp(fullSubFS/cardSubFS, 1, e).toFixed(4) + ')'; }
                  var padT = lerp((h - 92) * 0.42, cardPadT, e).toFixed(0);
                  var padB = lerp(40,0,e).toFixed(0);
                  var padLR = lerp(20,0,e).toFixed(0);
                  heroEl.style.padding = padT+'px '+padLR+'px '+padB+'px';
                  if(stream){
                    var heroBot = scroll > RANGE ? (cardH - (scroll - RANGE)) : h;
                    var want = heroBot + STREAM_GAP - fullScreenH + scroll;
                    var tf = 'translateY(' + want.toFixed(0) + 'px)';
                    stream.style.transform = tf;
                    if(loadMoreWrap){ loadMoreWrap.style.transform = tf; }
                  }
                  if(scroll > RANGE){
                    heroEl.style.transform = 'translateY(' + (-(scroll - RANGE)).toFixed(0) + 'px)';
                  } else {
                    heroEl.style.transform = '';
                  }
                  if(hint){ hint.style.opacity = Math.max(0, 1 - p / 0.18).toFixed(2); }
                  if(p > 0.98 && !done){ done = true; sessionStorage.setItem('homeHeroPlayed','true'); }
                }
                if(scrollHandler){ pcEl.removeEventListener('scroll', scrollHandler, {passive:true}); }
                scrollHandler = update;
                pcEl.addEventListener('scroll', update, {passive:true});
                if(played){
                  requestAnimationFrame(function(){ pcEl.scrollTop = RANGE; update(); });
                } else {
                  update();
                }
              }

              // 初始:按当前宽度决定
              if (mq.matches) {
                initDesktop();
              }

              // resize/横竖屏切换:跨越 992px 断点时重置
              // 宽→窄:清理 inline style,让 CSS @media≤991 接管(静态卡 + 隐藏 hint)
              // 窄→宽:重新初始化桌面动画
              if (mq.addEventListener) {
                mq.addEventListener('change', function(e){
                  if (e.matches) { initDesktop(); }   // 进入宽屏
                  else { clearHeroInline(); }          // 进入窄屏
                });
              } else if (mq.addListener) {
                mq.addListener(function(e){
                  if (e.matches) { initDesktop(); }
                  else { clearHeroInline(); }
                });
              }
            });
            </script>

            {{ partial "post_list.html" . }}
       	</div>
        {{ partial "sidebar.html" . }}
	</div>
</div>

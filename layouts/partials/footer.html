<!-- Side Catalog: 目录生成 + 滚动高亮 (极简 footer 改版时从主题移植回来,否则 catalog-body 永远空) -->
<script>
function generateCatalog(selector){
    var P = $('div.post-container'), a, n, t, l, i, c;
    a = P.find('h1,h2,h3,h4,h5,h6');
    $(selector).html('');
    a.each(function(){
        n = $(this).prop('tagName').toLowerCase();
        i = "#" + $(this).prop('id');
        t = $(this).text();
        c = $('<a href="'+i+'" rel="nofollow" title="'+t+'">'+t+'</a>');
        l = $('<li class="'+n+'_nav"></li>').append(c);
        $(selector).append(l);
    });
    return true;
}
generateCatalog(".catalog-body");
$(".catalog-toggle").click(function(e){ e.preventDefault(); $('.side-catalog').toggleClass("fold"); });
$.getScript("{{ `js/jquery.nav.js` | relURL }}", function(){
    $('.catalog-body').onePageNav({
        currentClass:"active", changeHash:!1, easing:"swing", filter:"",
        scrollSpeed:700, scrollOffset:0, scrollThreshold:.2,
        begin:null, end:null, scrollChange:null, padding:80
    });
});

// Catalog + Reading-tools 吸附:各自由"即将滚出视口顶"时钉住,钉在 top:36px。
// 这样两个元素触发时机各自精确,钉住时不跳变(连贯)。
// catalog(右列):.fixed。reading-tools(左列):.is-pinned + placeholder 占位防塌陷。
(function(){
    if(window.innerWidth < 1200) return;
    var catalog = document.querySelector('.side-catalog');
    var rtCol = document.querySelector('.reading-tools-container');
    if(!catalog && !rtCol) return;

    // 给 reading-tools 列建占位(fixed 时填进去,防左列塌陷)
    var placeholder = null;
    function ensurePlaceholder(){
        if(!rtCol || placeholder) return;
        placeholder = document.createElement('div');
        placeholder.style.width = window.getComputedStyle(rtCol).width;
        placeholder.style.height = rtCol.offsetHeight + 'px';
        placeholder.style.display = 'none';
        rtCol.parentNode.insertBefore(placeholder, rtCol);
    }

    // 每个元素各自算:当它的视口 y ≤ 36px(即将到顶)时钉住
    // 用 getBoundingClientRect 实时算,不依赖 header 高度(更精确,不受布局变化影响)
    function onScroll(){
        var pinTop = 36;
        if(catalog){
            var catY = catalog.getBoundingClientRect().top;
            // catalog 没加 fixed 时才量(避免 fixed 后 rect 是视口 top:36,恒满足)
            if(!catalog.classList.contains('fixed')){
                catalog._triggerY = catY;  // 记住它当前的文档流位置
            }
            var shouldPin = window.pageYOffset > 0 && catY <= pinTop;
            catalog.classList.toggle('fixed', shouldPin);
        }
        if(rtCol){
            ensurePlaceholder();
            if(!rtCol.classList.contains('is-pinned')){
                var rtY = rtCol.getBoundingClientRect().top;
                rtCol._triggerY = rtY;
            }
            var rtPin = window.pageYOffset > 0 && rtCol.getBoundingClientRect().top <= pinTop;
            rtCol.classList.toggle('is-pinned', rtPin);
            if(placeholder){ placeholder.style.display = rtPin ? 'block' : 'none'; }
        }
    }
    window.addEventListener('scroll', onScroll, {passive:true});
    onScroll();
})();
</script>
{{ end }}

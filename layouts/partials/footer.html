<!-- Side Catalog: 目录生成 + 滚动高亮 (极简 footer 改版时从主题移植回来,否则 catalog-body 永远空) -->
<script>
function generateCatalog(selector){
    var P = $('div.post-container'), a, n, t, l, i, c;
    a = P.find('h1,h2,h3,h4,h5,h6');
    $(selector).html('');
    a.each(function(){
        n = $(this).prop('tagName').toLowerCase();
        i = "#" + $(this).prop('id');
        t = $(this).text();
        c = $('<a href="'+i+'" rel="nofollow" title="'+t+'">'+t+'</a>');
        l = $('<li class="'+n+'_nav"></li>').append(c);
        $(selector).append(l);
    });
    return true;
}
generateCatalog(".catalog-body");
$(".catalog-toggle").click(function(e){ e.preventDefault(); $('.side-catalog').toggleClass("fold"); });
$.getScript("{{ `js/jquery.nav.js` | relURL }}", function(){
    $('.catalog-body').onePageNav({
        currentClass:"active", changeHash:!1, easing:"swing", filter:"",
        scrollSpeed:700, scrollOffset:0, scrollThreshold:.2,
        begin:null, end:null, scrollChange:null, padding:80
    });
});

// Catalog + Reading-tools 吸附:滚过文章 header 后钉顶。
// catalog(右列):直接 .side-catalog 加 .fixed(fixed,右列留白不影响正文)。
// reading-tools(左列):fixed 会塌陷左列→正文崩。用 placeholder 占位:fixed 时插入等宽占位元素。
(function(){
    if(window.innerWidth < 1200) return;
    var header = document.querySelector('header.intro-header .container');
    var catalog = document.querySelector('.side-catalog');
    var readingToolsCol = document.querySelector('.reading-tools-container');
    if(!header) return;

    // 给 reading-tools 列建一个占位(fixed 时填进去,防止左列塌陷)
    var placeholder = null;
    function ensurePlaceholder(){
        if(!readingToolsCol || placeholder) return;
        placeholder = document.createElement('div');
        placeholder.style.width = window.getComputedStyle(readingToolsCol).width;
        placeholder.style.height = readingToolsCol.offsetHeight + 'px';
        placeholder.style.display = 'none';
        readingToolsCol.parentNode.insertBefore(placeholder, readingToolsCol);
    }

    var threshold = header.offsetHeight + 20;
    function onScroll(){
        var st = window.pageYOffset || document.documentElement.scrollTop;
        var fixed = st > threshold;
        if(catalog){ catalog.classList.toggle('fixed', fixed); }
        if(readingToolsCol){
            ensurePlaceholder();
            readingToolsCol.classList.toggle('is-pinned', fixed);
            if(placeholder){ placeholder.style.display = fixed ? 'block' : 'none'; }
        }
    }
    window.addEventListener('scroll', onScroll, {passive:true});
    onScroll();
})();
</script>
{{ end }}

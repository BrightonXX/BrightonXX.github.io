<!-- Side Catalog: 目录生成 + 滚动高亮 (极简 footer 改版时从主题移植回来,否则 catalog-body 永远空) -->
<script>
function generateCatalog(selector){
    var P = $('div.post-container'), a, n, t, l, i, c;
    a = P.find('h1,h2,h3,h4,h5,h6');
    $(selector).html('');
    a.each(function(){
        n = $(this).prop('tagName').toLowerCase();
        i = "#" + $(this).prop('id');
        t = $(this).text();
        c = $('<a href="'+i+'" rel="nofollow" title="'+t+'">'+t+'</a>');
        l = $('<li class="'+n+'_nav"></li>').append(c);
        $(selector).append(l);
    });
    return true;
}
generateCatalog(".catalog-body");
$(".catalog-toggle").click(function(e){ e.preventDefault(); $('.side-catalog').toggleClass("fold"); });
$.getScript("{{ `js/jquery.nav.js` | relURL }}", function(){
    $('.catalog-body').onePageNav({
        currentClass:"active", changeHash:!1, easing:"swing", filter:"",
        scrollSpeed:700, scrollOffset:0, scrollThreshold:.2,
        begin:null, end:null, scrollChange:null, padding:80
    });
});

// Catalog + Reading-tools 吸附(sticky 模拟):
// 记住每个元素的文档流原始位置(offsetTop,不随滚动变)。
// scrollTop > 原始位置 - pinTop 时 → fixed(钉在 pinTop);
// scrollTop 回到原始位置以上 → 还原(回到文档流原位)。
// 这样上下滚动都连贯:元素"到达 pinTop 位置就停住",不跳变。
(function(){
    if(window.innerWidth < 1200) return;
    var catalog = document.querySelector('.side-catalog');
    var rtCol = document.querySelector('.reading-tools-container');
    if(!catalog && !rtCol) return;
    var PIN_TOP = 80;   // 与 CSS .fixed/.is-pinned 的 top 一致

    // 记录元素在文档流里的 offsetTop(相对文档顶,不随滚动变)
    function docOffset(el){
        var top = 0;
        while(el){ top += el.offsetTop; el = el.offsetParent; }
        return top;
    }
    var catOrigin = catalog ? docOffset(catalog) : Infinity;
    var rtOrigin = rtCol ? docOffset(rtCol) : Infinity;

    // reading-tools:记录一次 left(fixed 后横向位置会丢,用这个固定值锁定)
    // 延迟记录:等 generateCatalog + 字体加载后布局稳定
    var rtLeft = null;
    setTimeout(function(){
        if(rtCol){ rtLeft = rtCol.getBoundingClientRect().left; }
    }, 300);
    // reading-tools 占位(fixed 时防左列塌陷)
    var placeholder = null;
    function ensurePlaceholder(){
        if(!rtCol || placeholder) return;
        placeholder = document.createElement('div');
        placeholder.style.width = window.getComputedStyle(rtCol).width;
        placeholder.style.height = rtCol.offsetHeight + 'px';
        placeholder.style.display = 'none';
        rtCol.parentNode.insertBefore(placeholder, rtCol);
    }

    function onScroll(){
        var st = window.pageYOffset || document.documentElement.scrollTop;
        if(catalog){
            var catPin = st > (catOrigin - PIN_TOP);
            catalog.classList.toggle('fixed', catPin);
        }
        if(rtCol){
            ensurePlaceholder();
            var rtPin = st > (rtOrigin - PIN_TOP);
            if(rtPin && rtLeft !== null){
                rtCol.style.left = rtLeft + 'px';   // pin 时锁定 left(防止横向跑偏)
            } else {
                rtCol.style.left = '';               // 取消 pin 时清除,回到文档流
            }
            rtCol.classList.toggle('is-pinned', rtPin);
            if(placeholder){ placeholder.style.display = rtPin ? 'block' : 'none'; }
        }
    }
    window.addEventListener('scroll', onScroll, {passive:true});
    onScroll();
})();
</script>
{{ end }}
